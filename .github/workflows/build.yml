name: Build Plugin

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.BulkDownload.sln

      - name: Build
        run: |
          dotnet build Jellyfin.Plugin.BulkDownload.sln \
            --configuration Release \
            --no-restore \
            /property:GenerateFullPaths=true \
            /consoleloggerparameters:NoSummary

      - name: Create release ZIP
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#.}"
          mkdir -p dist
          cd Jellyfin.Plugin.BulkDownload/bin/Release/net8.0
          zip -j "../../../../dist/jellyfin-bulk-download_${VERSION}.zip" \
              Jellyfin.Plugin.BulkDownload.dll
          echo "PLUGIN_ZIP=dist/jellyfin-bulk-download_${VERSION}.zip" >> $GITHUB_ENV

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PLUGIN_ZIP }}
          generate_release_notes: true

      - name: Ensure gh-pages branch exists
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git ls-remote --exit-code origin gh-pages; then
            git checkout --orphan gh-pages
            git rm -rf .
            echo '{}' > repository.json
            git add repository.json
            git commit -m "Initialize gh-pages"
            git push origin gh-pages
            git checkout -
          fi

      - name: Update plugin manifest
        if: startsWith(github.ref, 'refs/tags/v')
        uses: Kevinjil/jellyfin-plugin-repo-action@v0.4.3
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
