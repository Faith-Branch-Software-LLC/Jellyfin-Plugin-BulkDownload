name: Build Plugin

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.BulkDownload.sln

      - name: Build
        run: |
          dotnet build Jellyfin.Plugin.BulkDownload.sln \
            --configuration Release \
            --no-restore \
            /property:GenerateFullPaths=true \
            /consoleloggerparameters:NoSummary

      - name: Create release ZIP
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cd Jellyfin.Plugin.BulkDownload/bin/Release/net8.0
          zip -j "../../../../dist/jellyfin-bulk-download_${VERSION}.zip" \
              Jellyfin.Plugin.BulkDownload.dll
          echo "PLUGIN_ZIP=dist/jellyfin-bulk-download_${VERSION}.zip" >> $GITHUB_ENV

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PLUGIN_ZIP }}
          generate_release_notes: true

      - name: Update plugin manifest
        if: startsWith(github.ref, 'refs/tags/v')
        uses: Kevinjil/jellyfin-plugin-repo-action@v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
