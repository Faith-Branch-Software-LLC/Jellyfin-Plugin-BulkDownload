name: Build Plugin

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.BulkDownload.sln

      - name: Build
        run: |
          dotnet build Jellyfin.Plugin.BulkDownload.sln \
            --configuration Release \
            --no-restore \
            /property:GenerateFullPaths=true \
            /consoleloggerparameters:NoSummary

      - name: Create release ZIP
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#.}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p dist

          # Generate meta.json — required by Jellyfin 10.9+ installer
          cat > dist/meta.json <<EOF
          {
            "category": "General",
            "changelog": "",
            "description": "Download playlists, TV series, seasons, and audiobooks as a single ZIP file.",
            "guid": "6c023404-f107-4b93-9253-148b088d4c9b",
            "imageUrl": "",
            "name": "Bulk Download",
            "overview": "Download playlists, TV series, seasons, and audiobooks as a single ZIP file.",
            "owner": "FaithBranch",
            "targetAbi": "10.11.0.0",
            "timestamp": "${TIMESTAMP}",
            "version": "${VERSION}.0"
          }
          EOF

          zip -j "dist/jellyfin-bulk-download_${VERSION}.zip" \
              Jellyfin.Plugin.BulkDownload/bin/Release/net9.0/Jellyfin.Plugin.BulkDownload.dll \
              dist/meta.json
          echo "PLUGIN_ZIP=dist/jellyfin-bulk-download_${VERSION}.zip" >> $GITHUB_ENV

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PLUGIN_ZIP }}
          generate_release_notes: true

      - name: Update plugin manifest
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#.}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CHECKSUM=$(md5sum "$PLUGIN_ZIP" | awk '{print toupper($1)}')
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/jellyfin-bulk-download_${VERSION}.zip"

          # Work in a separate directory to avoid conflicts with main branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages

          python3 - "$CHECKSUM" "$SOURCE_URL" "${VERSION}.0" "$TIMESTAMP" <<'PYEOF'
          import json, sys
          checksum, source_url, version, timestamp = sys.argv[1:]

          with open('/tmp/gh-pages/repository.json') as f:
              repo = json.load(f)

          plugin_guid = "6c023404-f107-4b93-9253-148b088d4c9b"
          new_ver = {
              "changelog": "",
              "checksum": checksum,
              "sourceUrl": source_url,
              "targetAbi": "10.11.0.0",
              "timestamp": timestamp,
              "version": version,
          }

          entry = next((p for p in repo if p.get('guid') == plugin_guid), None)
          if entry is None:
              entry = {
                  "category": "General",
                  "description": "Download playlists, TV series, seasons, and audiobooks as a single ZIP file.",
                  "guid": plugin_guid,
                  "imageUrl": "",
                  "name": "Bulk Download",
                  "overview": "Download playlists, TV series, seasons, and audiobooks as a single ZIP file.",
                  "owner": "FaithBranch",
                  "versions": [],
              }
              repo.append(entry)

          entry['versions'] = [v for v in entry['versions'] if v['version'] != version]
          entry['versions'].insert(0, new_ver)

          with open('/tmp/gh-pages/repository.json', 'w') as f:
              json.dump(repo, f, indent=2)
          PYEOF

          cd /tmp/gh-pages
          git add repository.json
          git commit -m "Update manifest for v${VERSION}"
          git push origin HEAD:gh-pages
