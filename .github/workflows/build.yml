name: Build Plugin

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.BulkDownload.sln

      - name: Build
        run: |
          dotnet build Jellyfin.Plugin.BulkDownload.sln \
            --configuration Release \
            --no-restore \
            /property:GenerateFullPaths=true \
            /consoleloggerparameters:NoSummary

      - name: Create release ZIP
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#.}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p dist

          # Generate meta.json — required by Jellyfin 10.9+ installer
          cat > dist/meta.json <<EOF
          {
            "category": "General",
            "changelog": "",
            "description": "Download playlists, TV series, seasons, and audiobooks as a single ZIP file.",
            "guid": "6c023404-f107-4b93-9253-148b088d4c9b",
            "imageUrl": "",
            "name": "Bulk Download",
            "overview": "Download playlists, TV series, seasons, and audiobooks as a single ZIP file.",
            "owner": "FaithBranch",
            "targetAbi": "10.10.0.0",
            "timestamp": "${TIMESTAMP}",
            "version": "${VERSION}.0"
          }
          EOF

          zip -j "dist/jellyfin-bulk-download_${VERSION}.zip" \
              Jellyfin.Plugin.BulkDownload/bin/Release/net8.0/Jellyfin.Plugin.BulkDownload.dll \
              dist/meta.json
          echo "PLUGIN_ZIP=dist/jellyfin-bulk-download_${VERSION}.zip" >> $GITHUB_ENV

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PLUGIN_ZIP }}
          generate_release_notes: true

      - name: Update plugin manifest
        if: startsWith(github.ref, 'refs/tags/v')
        uses: Kevinjil/jellyfin-plugin-repo-action@v0.4.3
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
